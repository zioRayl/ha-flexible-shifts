name: Flexible Shifts
version: "0.3.0"
slug: flexible_shifts
description: Gestione flessibile di turni, pause, preset orari, ferie e report annuali per Home Assistant.
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:calendar-clock
panel_title: Turni
panel_admin: false
stage: experimental
backup: hot
watchdog: http://[HOST]:[PORT:8099]/api/health
homeassistant_api: true
options:
  timezone: Europe/Rome
  home_assistant_sync: true
  sync_interval_seconds: 60
schema:
  timezone: str
  home_assistant_sync: bool
  sync_interval_seconds: int(30,3600)
